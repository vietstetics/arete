ter-events:none;opacity:0;transition:opacity .15s;z-index:100;letter-spacing:1px}.n:hover .lb{opacity:1}.bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}.ua{width:36px;height:36px;border-radius:50%;border:2px solid var(--cyan);background:linear-gradient(135deg,#0a2a4a,#0a4a6a);display:flex;align-items:center;justify-content:center;font-family:var(--font-hud);font-size:12px;font-weight:700;color:var(--cyan);box-shadow:var(--glow-s)}.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.tb{height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;background:rgba(2,8,18,.9);border-bottom:1px solid var(--border);gap:16px}.jt{font-family:var(--font-hud);font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:4px}.ts{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:p 2s infinite}@keyframes p{0%,100%{opacity:1}50%{opacity:.5}}.tc{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text2)}.content{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}.ph{text-align:center;padding:60px 20px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(12px);max-width:500px;width:100%}.pi{width:72px;height:72px;border-radius:16px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:var(--glow-s)}.pi svg{width:36px;height:36px;color:var(--cyan)}.pt{font-family:var(--font-hud);font-size:22px;font-weight:700;letter-spacing:2px;margin-bottom:8px}.ps{font-family:var(--font-mono);font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.6}.cb{display:inline-block;font-family:var(--font-hud);font-size:10px;letter-spacing:3px;padding:6px 18px;border:1px solid rgba(0,212,255,.4);border-radius:6px;color:var(--cyan);background:rgba(0,212,255,.06)}.bl{display:block;margin-top:16px;font-family:var(--font-mono);font-size:11px;color:var(--text2);text-decoration:none;transition:color .2s}.bl:hover{color:var(--cyan)}</style></head>
