<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JARVIS — Recovery</title><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet"><style>:root{--bg:#020810;--cyan:#00d4ff;--green:#00ff88;--text:#c8eeff;--text2:#6a9ab8;--text3:#2a5a7a;--border:rgba(0,212,255,.14);--border2:rgba(0,212,255,.35);--glow-s:0 0 8px rgba(0,212,255,.5);--panel:rgba(3,14,30,.88);--font-hud:'Orbitron',monospace;--font-mono:'Share Tech Mono',monospace;--font-body:'Exo 2',sans-serif;--sidebar-w:68px}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:48px 48px}.app{display:flex;height:100vh;position:relative;z-index:1}.sidebar{width:var(--sidebar-w);flex-shrink:0;display:flex;flex-direction:column;align-items:center;background:rgba(2,8,18,.95);border-right:1px solid var(--border);padding:12px 0;gap:2px}.sidebar-logo{width:40px;height:40px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}.sidebar-logo svg{width:36px;height:36px;filter:drop-shadow(0 0 8px var(--cyan))}.nav-item{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;position:relative;transition:all .2s;border:1px solid transparent;color:var(--text3);text-decoration:none}.nav-item:hover{color:var(--cyan);background:rgba(0,212,255,.08);border-color:var(--border)}.nav-item.active{color:var(--cyan);background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);box-shadow:var(--glow-s)}.nav-item svg{width:18px;height:18px}.nav-item .lbl{position:absolute;left:calc(100% + 10px);background:rgba(3,14,30,.98);border:1px solid var(--border2);color:var(--cyan);font-family:var(--font-mono);font-size:11px;padding:4px 10px;border-radius:4px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;letter-spacing:1px}.nav-item:hover .lbl{opacity:1}.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px}.user-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--cyan);background:linear-gradient(135deg,#0a2a4a,#0a4a6a);display:flex;align-items:center;justify-content:center;font-family:var(--font-hud);font-size:12px;font-weight:700;color:var(--cyan);cursor:pointer;box-shadow:var(--glow-s)}.main{flex:1;display:flex;flex-direction:column;overflow:hidden}.topbar{height:48px;flex-shrink:0;display:flex;align-items:center;padding:0 16px;background:rgba(2,8,18,.9);border-bottom:1px solid var(--border);gap:16px}.jarvis-title{font-family:var(--font-hud);font-size:14px;font-weight:700;color:var(--cyan);letter-spacing:4px}.topbar-status{display:flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:11px;color:var(--text2)}.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pd 2s infinite}@keyframes pd{0%,100%{opacity:1}50%{opacity:.5}}.topbar-right{margin-left:auto;font-family:var(--font-mono);font-size:11px;color:var(--text2)}.content{flex:1;overflow-y:auto;padding:24px;display:flex;align-items:center;justify-content:center}.page-hero{text-align:center;padding:60px 20px;border:1px solid var(--border);border-radius:16px;background:var(--panel);backdrop-filter:blur(12px);max-width:500px;width:100%}.page-icon{width:72px;height:72px;border-radius:16px;background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;box-shadow:var(--glow-s)}.page-icon svg{width:36px;height:36px;color:var(--cyan)}.pt{font-family:var(--font-hud);font-size:22px;font-weight:700;color:var(--text);letter-spacing:2px;margin-bottom:8px}.ps{font-family:var(--font-mono);font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.6}.cb{display:inline-block;font-family:var(--font-hud);font-size:10px;letter-spacing:3px;padding:6px 18px;border:1px solid rgba(0,212,255,.4);border-radius:6px;color:var(--cyan);background:rgba(0,212,255,.06)}.bl{display:inline-block;margin-top:16px;font-family:var(--font-mono);font-size:11px;color:var(--text2);text-decoration:none;transition:color .2s;letter-spacing:1px}.bl:hover{color:var(--cyan)}</style></head>
