<style>:root{--bg:#0C0C0F;--s1:#111115;--s2:#17171B;--s3:#1E1E23;--s4:#262629;--bd:#252529;--bd2:#333339;--t1:#EDEDEF;--t2:#8A8A94;--t3:#52525A;--vi:#A78BFA}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{height:100%}body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}a{color:inherit;text-decoration:none}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}.app{display:flex;height:100vh;overflow:hidden}.sb{width:220px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto}.sb-top{padding:18px 14px 14px;border-bottom:1px solid var(--bd)}.sb-brand{display:flex;align-items:center;gap:9px;padding:0 4px}.sb-icon{width:28px;height:28px;border-radius:7px;background:var(--vi);display:flex;align-items:center;justify-content:center;flex-shrink:0}.sb-name{font-size:15px;font-weight:700;letter-spacing:-.02em}.sb-nav{flex:1;padding:8px 8px}.nav-section{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);padding:14px 8px 5px}.ni{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:8px;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;position:relative;transition:background 120ms,color 120ms}.ni:hover{background:var(--s3);color:var(--t2)}.ni.on{background:var(--s3);color:var(--t1)}.ni.on .ni-ic{color:var(--vi)}.ni.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:52%;background:var(--vi);border-radius:0 2px 2px 0}.ni-ic{width:16px;height:16px;flex-shrink:0;transition:color 120ms}.sb-foot{padding:12px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:9px;cursor:pointer;transition:background 120ms}.sb-foot:hover{background:var(--s3)}.av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,var(--vi));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}.av-name{font-size:12.5px;font-weight:600}.av-plan{font-size:10.5px;color:var(--t3)}.main{flex:1;min-width:0;overflow-y:auto}.wrap{padding:48px 32px;max-width:600px;margin:0 auto;text-align:center}.ph-icon{width:64px;height:64px;border-radius:16px;background:var(--s2);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--vi)}.ph-title{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}.ph-sub{font-size:13.5px;color:var(--t2);line-height:1.7;margin-bottom:24px}.badge{display:inline-flex;padding:5px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--bd);font-size:11.5px;color:var(--t3);font-weight:600;letter-spacing:.04em;margin-bottom:16px}.back{font-size:12.5px;color:var(--t3);transition:color 120ms;display:inline-flex;align-items:center;gap:4px}.back:hover{color:var(--t1)}@media(max-width:767px){.sb{display:none}.wrap{padding:32px 16px}}</style>
</head>
