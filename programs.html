<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS — Programs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5F7;--s1:rgba(0,0,0,.03);--s2:rgba(0,0,0,.05);--s3:rgba(0,0,0,.07);
  --s4:rgba(0,0,0,.10);--bd:rgba(0,0,0,.09);--bd2:rgba(0,0,0,.15);
  --t1:#1D1D1F;--t2:#6E6E73;--t3:#AEAEB2;
  --gr:#1DA462;--grd:rgba(29,164,98,.10);
  --vi:#5E5CE6;--vid:rgba(94,92,230,.10);
  --re:#C0403A;
  --r:16px;--r-sm:10px;
  --sh0:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --sh1:0 6px 24px rgba(0,0,0,.12),0 1px 4px rgba(0,0,0,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--s4);border-radius:4px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ── LAYOUT ───────────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}
.main{flex:1;min-width:0;overflow-y:auto}

/* ── SIDEBAR ──────────────────────────────────────────────────── */
.sb{width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto}
.sb-top{padding:22px 16px 16px;border-bottom:1px solid var(--bd)}
.sb-brand{display:flex;align-items:center;gap:10px;padding:0 4px}
.sb-icon{width:30px;height:30px;border-radius:9px;background:var(--vi);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{font-size:15px;font-weight:700;letter-spacing:-.02em}
.sb-nav{flex:1;padding:10px}
.nav-section{font-size:10px;font-weight:500;color:var(--t3);padding:16px 8px 5px}
.ni{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:12px;color:var(--t3);font-size:13px;font-weight:500;cursor:pointer;transition:background 160ms,color 160ms}
.ni:hover{background:var(--s2);color:var(--t2)}
.ni.on{background:var(--s2);color:var(--t1)}
.ni.on .ni-ic{color:var(--vi)}
.ni-ic{width:16px;height:16px;flex-shrink:0}
.sb-foot{padding:14px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 160ms}
.sb-foot:hover{background:var(--s2)}
.av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#4F46E5,var(--vi));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.av-name{font-size:13px;font-weight:600}
.av-plan{font-size:11px;color:var(--t3)}

/* ── PAGE ─────────────────────────────────────────────────────── */
.pg{padding:32px 32px 64px;max-width:1100px}
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px}
.ph-title{font-size:22px;font-weight:600;letter-spacing:-.02em;margin-bottom:4px}
.ph-sub{font-size:13px;color:var(--t2)}

/* ── BUTTONS ──────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;transition:all 160ms;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-p{background:#1D1D1F;color:#fff;border:none}
.btn-p:hover{background:#000}
.btn-s{background:#fff;color:var(--t1);border:1px solid var(--bd)}
.btn-s:hover{border-color:var(--bd2);box-shadow:var(--sh0)}
.btn-gr{background:var(--gr);color:#fff;border:none}
.btn-gr:hover{background:#158A50}
.btn-vi{background:var(--vi);color:#fff;border:none}
.btn-vi:hover{background:#4A48C8}
.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:9px}
.btn-xs{padding:5px 10px;font-size:11.5px;border-radius:8px}
.btn-danger{color:var(--re);font-size:12px;font-weight:500;padding:5px 8px;border-radius:7px;background:transparent}
.btn-danger:hover{background:rgba(192,64,58,.08)}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--t2);background:transparent;transition:all 130ms;flex-shrink:0}
.icon-btn:hover{background:var(--s3);color:var(--t1)}

/* ── CARDS ────────────────────────────────────────────────────── */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh0)}
.card:hover{border-color:var(--bd2)}

/* ── TWO-COLUMN ───────────────────────────────────────────────── */
.cols{display:grid;grid-template-columns:268px 1fr;gap:20px;align-items:start}

/* ── PROGRAM LIST ─────────────────────────────────────────────── */
.prog-list{display:flex;flex-direction:column;gap:1px;padding:6px}
.prog-item{padding:11px 14px;border-radius:12px;cursor:pointer;transition:background 140ms;display:flex;align-items:center;gap:10px}
.prog-item:hover{background:var(--s2)}
.prog-item.active{background:var(--vid);outline:1px solid rgba(94,92,230,.2);outline-offset:-1px}
.prog-item.active .prog-dot{background:var(--vi)}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--t3);flex-shrink:0;transition:background 140ms}
.prog-name-sm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.prog-meta-sm{font-size:11px;color:var(--t3);margin-top:2px}
.prog-empty{padding:32px 16px;text-align:center;color:var(--t3);font-size:12.5px;line-height:1.8}

/* ── PROGRAM DETAIL ───────────────────────────────────────────── */
.detail-head{padding:18px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.prog-name-input{font-size:16px;font-weight:600;color:var(--t1);background:transparent;border:none;outline:none;border-bottom:2px solid transparent;padding-bottom:1px;transition:border-color 150ms;flex:1;min-width:0}
.prog-name-input:focus{border-color:var(--vi)}
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--bd)}
.stat-cell{flex:1;padding:12px 16px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--bd)}
.stat-cell:last-child{border-right:0}
.stat-v{font-size:18px;font-weight:600;letter-spacing:-.01em}
.stat-l{font-size:10.5px;color:var(--t3);font-weight:500}
.mock-note{font-size:10.5px;color:var(--t3);padding:8px 20px;font-style:italic;border-bottom:1px solid var(--bd)}

/* ── SCHEDULE TABLE ───────────────────────────────────────────── */
.sched-wrap{overflow-x:auto}
.sched-table{width:100%;border-collapse:collapse;min-width:560px}
.sched-table thead th{
  font-size:10.5px;font-weight:600;color:var(--t3);text-align:left;
  padding:12px 16px 10px;border-bottom:2px solid var(--bd);letter-spacing:.04em;text-transform:uppercase;
  white-space:nowrap;
}
.sched-table thead th:last-child{text-align:right}
.sched-table tbody tr:last-child td{border-bottom:0}

/* Day row */
.day-row td{padding:11px 16px;border-bottom:1px solid var(--bd);vertical-align:middle;transition:background 110ms}
.day-row:hover td{background:var(--s1)}
.day-row.is-today td{background:rgba(94,92,230,.025)}
.day-row.is-today .day-name-cell{border-left:3px solid var(--vi);padding-left:13px}
.day-row.editing td{background:rgba(94,92,230,.035)}
.day-name-col{width:100px;white-space:nowrap}
.day-name{font-size:13px;font-weight:500}
.day-today-badge{font-size:9.5px;font-weight:700;color:var(--vi);background:var(--vid);padding:2px 6px;border-radius:5px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em;vertical-align:middle}
.wo-name-col{width:130px}
.wo-name{font-size:13px;font-weight:500}
.wo-rest{font-size:12.5px;color:var(--t3);font-style:italic}
.chips-col{} /* flex */
.chips-wrap{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.ex-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500;background:var(--s2);color:var(--t2);white-space:nowrap}
.ex-chip strong{color:var(--t1)}
.more-chip{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:var(--s3);color:var(--t3)}
.actions-col{width:160px;text-align:right;white-space:nowrap}
.day-actions{display:flex;align-items:center;justify-content:flex-end;gap:5px}

/* Editing expanded row */
.edit-row td{padding:0;border-bottom:1px solid var(--bd)}
.edit-inner{padding:14px 16px 16px;background:rgba(94,92,230,.025);border-top:1px solid rgba(94,92,230,.12)}
.edit-name-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.edit-name-input{flex:1;padding:8px 12px;border-radius:9px;border:1px solid var(--bd);background:#fff;color:var(--t1);font-size:13px;outline:none;transition:border-color 140ms}
.edit-name-input:focus{border-color:var(--vi);box-shadow:0 0 0 3px rgba(94,92,230,.10)}
.edit-name-input::placeholder{color:var(--t3)}

/* Exercise mini-table */
.ex-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.ex-table th{font-size:10px;font-weight:600;color:var(--t3);text-align:left;padding:0 8px 6px;letter-spacing:.04em}
.ex-table th:nth-child(3),.ex-table th:nth-child(4){text-align:center;width:60px}
.ex-table th:last-child{width:28px}
.ex-table td{padding:4px 8px;vertical-align:middle}
.ex-name-cell{font-size:12.5px;font-weight:500}
.ex-num{width:48px;padding:4px 6px;border-radius:6px;border:1px solid var(--bd);background:#fff;color:var(--t1);font-size:12px;text-align:center;outline:none;transition:border-color 130ms}
.ex-num:focus{border-color:var(--vi)}
.ex-reps{width:64px;padding:4px 7px;border-radius:6px;border:1px solid var(--bd);background:#fff;color:var(--t1);font-size:12px;outline:none;transition:border-color 130ms}
.ex-reps:focus{border-color:var(--vi)}
.ex-table tbody tr{border-radius:6px;transition:background 100ms}
.ex-table tbody tr:hover{background:rgba(0,0,0,.03)}

/* ── EXERCISE CATALOGUE PANEL ─────────────────────────────────── */
.cat-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:290;display:none;backdrop-filter:blur(2px)}
.cat-backdrop.open{display:block}
.cat-panel{position:fixed;top:0;right:0;width:360px;height:100%;background:#fff;border-left:1px solid var(--bd);box-shadow:var(--sh1);z-index:300;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 240ms cubic-bezier(.25,.8,.25,1)}
.cat-panel.open{transform:translateX(0)}
.cat-head{padding:18px 18px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cat-title{font-size:15px;font-weight:700}
.cat-target{font-size:12px;color:var(--t2);margin-top:2px}
.cat-search-wrap{padding:12px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
.cat-search{width:100%;padding:8px 12px;border-radius:9px;border:1px solid var(--bd);background:var(--bg);color:var(--t1);font-size:13px;outline:none;transition:border-color 140ms}
.cat-search:focus{border-color:var(--vi);background:#fff;box-shadow:0 0 0 3px rgba(94,92,230,.10)}
.cat-search::placeholder{color:var(--t3)}
.cat-body{flex:1;overflow-y:auto;padding:8px 0}
.cat-section{margin-bottom:4px}
.cat-section-label{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.06em;text-transform:uppercase;padding:10px 16px 5px}
.cat-ex-row{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background 110ms}
.cat-ex-row:hover{background:var(--s2)}
.cat-ex-row.selected{background:var(--vid)}
.cat-cb{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--bd2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 130ms}
.cat-ex-row.selected .cat-cb{background:var(--vi);border-color:var(--vi)}
.cat-ex-name{font-size:13px;font-weight:500;flex:1}
.cat-muscles{font-size:10.5px;color:var(--t3)}
.cat-foot{padding:14px 16px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;gap:10px}
.cat-count{font-size:12.5px;color:var(--t2);flex:1}

/* ── EMPTY STATE ──────────────────────────────────────────────── */
.empty-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:64px 32px;text-align:center;color:var(--t3);gap:12px;min-height:320px}
.empty-panel h3{font-size:15px;font-weight:600;color:var(--t2)}
.empty-panel p{font-size:12.5px;max-width:280px;line-height:1.6}

@media(max-width:900px){.cols{grid-template-columns:1fr}}
@media(max-width:767px){.sb{display:none}.pg{padding:20px 16px 48px}.ph{flex-direction:column;gap:12px}}
.mob-back{display:none;position:fixed;top:0;left:0;right:0;z-index:50;align-items:center;gap:5px;padding:12px 16px;background:rgba(245,245,247,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);font-size:14px;font-weight:600;color:var(--vi);text-decoration:none;cursor:pointer}
.mob-back svg{width:18px;height:18px}
@media(max-width:767px){.mob-back{display:flex}.pg{padding-top:60px!important}}
</style>
</head>

<!-- SIDEBAR -->

    <div class="sb-brand">
      <div class="sb-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
      <span class="sb-name">JARVIS</span>

  </nav>
  <a href="settings.html" class="sb-foot">
    <div class="av">J</div>
    <div><div class="av-name">Joseph N.</div><div class="av-plan">JARVIS Pro</div></div>
  </a>
</aside>

<!-- MAIN -->
<main class="main">
<div class="pg">
  <div class="ph">
    <div>
      <div class="ph-title">Programs</div>
      <div class="ph-sub">Weekly training schedules that repeat automatically.</div>
    </div>
    <div style="display:flex;gap:8px">
      <a href="exercises.html" class="btn btn-s btn-sm">Exercise database</a>
      <button class="btn btn-p btn-sm" onclick="createProgram()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Program
      </button>
    </div>
  </div>

  <div class="cols">
    <!-- Left: list -->
    <div class="card" style="overflow:hidden">
      <div style="padding:14px 16px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:13px;font-weight:600">My Programs</span>
        <span id="prog-count" style="font-size:11px;color:var(--t3)"></span>
      </div>
      <div id="prog-list" class="prog-list"></div>
    </div>

    <!-- Right: detail -->
    <div id="right-panel"></div>
  </div>
</div>
</main>
</div>

<!-- Exercise catalogue slide-in panel -->
<div class="cat-backdrop" id="cat-backdrop" onclick="closeCatalogue()"></div>
<div class="cat-panel" id="cat-panel">
  <div class="cat-head">
    <div>
      <div class="cat-title">Add Exercises</div>
      <div class="cat-target" id="cat-target-label"></div>
    </div>
    <button class="icon-btn" onclick="closeCatalogue()" title="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cat-search-wrap">
    <input class="cat-search" id="cat-search" placeholder="Search exercises…" oninput="filterCatalogue(this.value)">
  </div>
  <div class="cat-body" id="cat-body"></div>
  <div class="cat-foot">
    <span class="cat-count" id="cat-sel-count">0 selected</span>
    <button class="btn btn-vi btn-sm" onclick="addSelectedToDay()">Add to workout</button>
  </div>
</div>

<script src="js/fitness.js"></script>
<script>
const F         = window.Fitness;
const DAY_ORDER = [1,2,3,4,5,6,0]; // Mon → Sun
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const TODAY     = new Date().getDay();

// Exercise catalogue grouped by category
const CATALOGUE = {
  'Chest':     ['Bench Press','Incline Bench','Dumbbell Fly','Push-Up'],
  'Shoulders': ['Overhead Press','Lateral Raise','Front Raise','Rear Delt Fly','Face Pull','Upright Row'],
  'Back':      ['Pull-Up','Lat Pulldown','Barbell Row','Cable Row','Shrug'],
  'Arms':      ['Barbell Curl','Hammer Curl','Preacher Curl','Tricep Pushdown','Skull Crusher','Dip'],
  'Legs':      ['Squat','Leg Press','Leg Extension','Romanian Deadlift','Deadlift','Good Morning','Leg Curl','Hip Thrust','Lunge','Sumo Squat','Calf Raise','Seated Calf Raise'],
  'Core':      ['Plank','Crunch','Russian Twist','Hanging Leg Raise','Side Plank'],
  'Other':     ["Farmer's Carry",'Cable Adduction'],
};

// ── State ─────────────────────────────────────────────────────
let selectedId    = null;
let editingDayIdx = null;
let catDayIdx     = null;   // which day the catalogue is adding to
let catProgId     = null;
let catSelected   = new Set();

// ── Storage ───────────────────────────────────────────────────
function getPrograms() {
  try { return JSON.parse(localStorage.getItem('jarvis_programs') || '[]'); } catch { return []; }
}
function saveProgram(prog) {
  const list = getPrograms();
  const idx  = list.findIndex(p => p.id === prog.id);
  if (idx >= 0) list[idx] = prog; else list.unshift(prog);
  localStorage.setItem('jarvis_programs', JSON.stringify(list));
}
function deleteProgram(id) {
  localStorage.setItem('jarvis_programs', JSON.stringify(getPrograms().filter(p => p.id !== id)));
}

// MOCKED: seed two example programs ───────────────────────────
function seedPrograms() {
  if (getPrograms().length > 0) return;
  const ex = (n, s, r) => ({ name: n, targetSets: s, targetReps: r });
  const programs = [
    {
      id: 'prog-ppl', name: 'Push / Pull / Legs', createdAt: Date.now(),
      days: {
        1: { name: 'Push Day',  exercises: [ex('Bench Press',4,'6-8'), ex('Overhead Press',3,'8-10'), ex('Dumbbell Fly',3,'12'), ex('Tricep Pushdown',3,'12'), ex('Lateral Raise',3,'15')] },
        2: { name: 'Pull Day',  exercises: [ex('Pull-Up',4,'6-8'), ex('Barbell Row',4,'6-8'), ex('Face Pull',3,'15'), ex('Barbell Curl',3,'10-12'), ex('Hammer Curl',2,'12')] },
        3: null,
        4: { name: 'Leg Day',   exercises: [ex('Squat',4,'5-6'), ex('Romanian Deadlift',3,'8-10'), ex('Leg Press',3,'12'), ex('Leg Curl',3,'12'), ex('Calf Raise',4,'15')] },
        5: { name: 'Push Day',  exercises: [ex('Incline Bench',4,'8'), ex('Overhead Press',3,'8'), ex('Tricep Pushdown',3,'12'), ex('Lateral Raise',4,'15')] },
        6: { name: 'Pull Day',  exercises: [ex('Lat Pulldown',4,'10'), ex('Cable Row',3,'10'), ex('Rear Delt Fly',3,'15'), ex('Barbell Curl',3,'10')] },
        0: null,
      }
    },
    {
      id: 'prog-3day', name: '3-Day Full Body', createdAt: Date.now() - 86400000,
      days: {
        1: { name: 'Full Body A', exercises: [ex('Squat',3,'5'), ex('Bench Press',3,'5'), ex('Barbell Row',3,'5'), ex('Overhead Press',2,'8')] },
        2: null, 3: { name: 'Full Body B', exercises: [ex('Squat',3,'5'), ex('Overhead Press',3,'5'), ex('Deadlift',1,'5'), ex('Pull-Up',3,'8')] },
        4: null, 5: { name: 'Full Body A', exercises: [ex('Squat',3,'5'), ex('Bench Press',3,'5'), ex('Barbell Row',3,'5'), ex('Calf Raise',3,'15')] },
        6: null, 0: null,
      }
    }
  ];
  localStorage.setItem('jarvis_programs', JSON.stringify(programs));
}

// ── Boot ──────────────────────────────────────────────────────
seedPrograms();
const boot = getPrograms();
if (boot.length) selectedId = boot[0].id;
render();

// ── Render ────────────────────────────────────────────────────
function render() { renderList(); selectedId ? renderDetail(selectedId) : renderEmpty(); }

function renderList() {
  const progs = getPrograms();
  document.getElementById('prog-count').textContent = progs.length ? `${progs.length}` : '';
  if (!progs.length) {
    document.getElementById('prog-list').innerHTML = `<div class="prog-empty">No programs yet.<br>Tap <strong>New Program</strong> to start.</div>`;
    return;
  }
  document.getElementById('prog-list').innerHTML = progs.map(p => {
    const n = Object.values(p.days).filter(Boolean).length;
    return `<div class="prog-item${p.id === selectedId ? ' active' : ''}" onclick="selectProgram('${p.id}')">
      <div class="prog-dot"></div>
      <div>
        <div class="prog-name-sm">${esc(p.name)}</div>
        <div class="prog-meta-sm">${n} training day${n !== 1 ? 's' : ''} / week</div>
      </div>
    </div>`;
  }).join('');
}

function renderDetail(id) {
  const prog = getPrograms().find(p => p.id === id);
  if (!prog) { renderEmpty(); return; }
  const trainDays    = Object.values(prog.days).filter(Boolean).length;
  const totalEx      = Object.values(prog.days).filter(Boolean).reduce((t,d) => t + d.exercises.length, 0);
  const totalSets    = Object.values(prog.days).filter(Boolean)
                        .reduce((t,d) => t + d.exercises.reduce((s,e) => s + (e.targetSets||0), 0), 0);

  const rows = DAY_ORDER.map(di => {
    const wo      = prog.days[di] || null;
    const isToday = di === TODAY;
    const editing = editingDayIdx === di;
    const chips   = wo ? buildChips(wo.exercises) : '';

    const mainRow = `<tr class="day-row${isToday ? ' is-today' : ''}${editing ? ' editing' : ''}">
      <td class="day-name-col day-name-cell">
        <span class="day-name">${DAY_NAMES[di].slice(0,3)}</span>
        ${isToday ? '<span class="day-today-badge">Today</span>' : ''}
      </td>
      <td class="wo-name-col">
        ${wo ? `<span class="wo-name">${esc(wo.name)}</span>` : `<span class="wo-rest">Rest</span>`}
      </td>
      <td class="chips-col">
        <div class="chips-wrap">${chips}</div>
      </td>
      <td class="actions-col">
        <div class="day-actions">
          ${wo ? `<button class="btn btn-gr btn-xs" onclick="startWorkout('${id}',${di})">Start</button>` : ''}
          <button class="btn btn-s btn-xs" onclick="toggleEdit('${id}',${di})">${editing ? 'Done' : (wo ? 'Edit' : '+ Add')}</button>
          ${wo && !editing ? `<button class="icon-btn" onclick="clearDay('${id}',${di})" title="Remove workout" style="width:24px;height:24px;border-radius:6px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>` : ''}
        </div>
      </td>
    </tr>`;

    const editRow = editing ? `<tr class="edit-row">
      <td colspan="4">
        <div class="edit-inner">
          <div class="edit-name-row">
            <input class="edit-name-input" id="ename-${di}" placeholder="Workout name (e.g. Push Day)"
              value="${esc(wo?.name || '')}"
              onchange="updateDayName('${id}',${di},this.value)"
              onblur="updateDayName('${id}',${di},this.value)">
            <button class="btn btn-vi btn-xs" onclick="openCatalogue('${id}',${di})">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Add exercises
            </button>
          </div>
          ${buildExTable(prog, di)}
        </div>
      </td>
    </tr>` : '';

    return mainRow + editRow;
  }).join('');

  document.getElementById('right-panel').innerHTML = `
    <div class="card" style="overflow:hidden">
      <div class="detail-head">
        <input class="prog-name-input" id="pname-${id}" value="${esc(prog.name)}"
          onchange="renameProg('${id}',this.value)" onblur="renameProg('${id}',this.value)">
        <button class="btn-danger btn-sm" onclick="confirmDelete('${id}')">Delete</button>
      </div>
      <div class="stats-bar">
        <div class="stat-cell"><div class="stat-v">${trainDays}</div><div class="stat-l">Training days</div></div>
        <div class="stat-cell"><div class="stat-v">${7 - trainDays}</div><div class="stat-l">Rest days</div></div>
        <div class="stat-cell"><div class="stat-v">${totalEx}</div><div class="stat-l">Exercises</div></div>
        <div class="stat-cell"><div class="stat-v">${totalSets}</div><div class="stat-l">Total sets</div></div>
      </div>
      <div class="mock-note">MOCKED: example programs — edit or replace with your own plan.</div>
      <div class="sched-wrap">
        <table class="sched-table">
          <thead><tr>
            <th>Day</th><th>Workout</th><th>Exercises</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

function buildChips(exercises) {
  const SHOW = 3;
  const chips = exercises.slice(0, SHOW).map(e =>
    `<span class="ex-chip"><strong>${esc(e.name)}</strong> ${e.targetSets}×${esc(e.targetReps)}</span>`
  ).join('');
  const more  = exercises.length > SHOW ? `<span class="more-chip">+${exercises.length - SHOW}</span>` : '';
  return chips + more;
}

function buildExTable(prog, di) {
  const wo = prog.days[di];
  if (!wo || !wo.exercises.length) return `<p style="font-size:12px;color:var(--t3);padding:4px 0 8px">No exercises yet — tap <strong>Add exercises</strong>.</p>`;
  const rows = wo.exercises.map((ex, ei) => `
    <tr>
      <td class="ex-name-cell">${esc(ex.name)}</td>
      <td style="text-align:center">
        <input class="ex-num" type="number" min="1" value="${ex.targetSets}"
          title="Sets" onchange="updateField('${prog.id}',${di},${ei},'targetSets',+this.value)">
      </td>
      <td style="text-align:center"><span style="font-size:11px;color:var(--t3)">×</span></td>
      <td>
        <input class="ex-reps" type="text" value="${esc(ex.targetReps)}"
          title="Reps / scheme" onchange="updateField('${prog.id}',${di},${ei},'targetReps',this.value)">
      </td>
      <td>
        <button class="icon-btn" onclick="removeEx('${prog.id}',${di},${ei})" title="Remove"
          style="width:24px;height:24px;border-radius:6px">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </td>
    </tr>`).join('');
  return `<table class="ex-table">
    <thead><tr><th>Exercise</th><th>Sets</th><th></th><th>Reps / scheme</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderEmpty() {
  document.getElementById('right-panel').innerHTML = `
    <div class="card">
      <div class="empty-panel">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <h3>No program selected</h3>
        <p>Create a new program or pick one from the list.</p>
      </div>
    </div>`;
}

// ── Actions ───────────────────────────────────────────────────
function createProgram() {
  const prog = { id: F.uid(), name: 'New Program', createdAt: Date.now(),
    days: {0:null,1:null,2:null,3:null,4:null,5:null,6:null} };
  saveProgram(prog);
  selectedId = prog.id; editingDayIdx = null; render();
}
function selectProgram(id) { selectedId = id; editingDayIdx = null; render(); }
function renameProg(id, val) {
  const prog = getPrograms().find(p => p.id === id);
  if (!prog || prog.name === val.trim()) return;
  prog.name = val.trim() || 'Program'; saveProgram(prog); renderList();
}
function confirmDelete(id) {
  const prog = getPrograms().find(p => p.id === id);
  if (!prog || !confirm(`Delete "${prog.name}"?`)) return;
  deleteProgram(id); selectedId = getPrograms()[0]?.id || null; editingDayIdx = null; render();
}
function toggleEdit(progId, di) {
  editingDayIdx = editingDayIdx === di ? null : di; renderDetail(progId);
}
function clearDay(progId, di) {
  const prog = getPrograms().find(p => p.id === progId);
  if (!prog) return;
  prog.days[di] = null; saveProgram(prog);
  if (editingDayIdx === di) editingDayIdx = null;
  renderDetail(progId);
}
function updateDayName(progId, di, name) {
  const prog = getPrograms().find(p => p.id === progId);
  if (!prog) return;
  if (!prog.days[di]) prog.days[di] = { name: '', exercises: [] };
  prog.days[di].name = name.trim() || DAY_NAMES[di] + ' Workout';
  saveProgram(prog);
}
function updateField(progId, di, ei, field, val) {
  const prog = getPrograms().find(p => p.id === progId);
  if (!prog?.days[di]) return;
  prog.days[di].exercises[ei][field] = val; saveProgram(prog);
}
function removeEx(progId, di, ei) {
  const prog = getPrograms().find(p => p.id === progId);
  if (!prog?.days[di]) return;
  prog.days[di].exercises.splice(ei, 1);
  if (!prog.days[di].exercises.length && !prog.days[di].name) prog.days[di] = null;
  saveProgram(prog); renderDetail(progId);
}

// ── Start workout from program ─────────────────────────────────
function startWorkout(progId, di) {
  const prog = getPrograms().find(p => p.id === progId);
  if (!prog?.days[di]) return;
  const template = prog.days[di];
  const prefill = {
    name: template.name,
    exercises: template.exercises.map(ex => {
      const map = F.EXERCISE_MUSCLES[ex.name] || { primary: [], secondary: [] };
      const sets = [{ id: F.uid(), type: 'warmup', weight: null, unit: 'kg', reps: null, completed: false }];
      for (let i = 0; i < (ex.targetSets || 3); i++)
        sets.push({ id: F.uid(), type: 'working', weight: null, unit: 'kg', reps: ex.targetReps, completed: false });
      return { id: F.uid(), name: ex.name, primaryMuscles: map.primary, secondaryMuscles: map.secondary, sets };
    }),
  };
  localStorage.setItem('jarvis_prefill', JSON.stringify(prefill));
  window.location.href = 'workouts.html';
}

// ── Exercise catalogue panel ───────────────────────────────────
function openCatalogue(progId, di) {
  catProgId  = progId;
  catDayIdx  = di;
  catSelected.clear();
  document.getElementById('cat-target-label').textContent =
    `Adding to ${DAY_NAMES[di]} workout`;
  document.getElementById('cat-search').value = '';
  renderCatalogue('');
  document.getElementById('cat-backdrop').classList.add('open');
  document.getElementById('cat-panel').classList.add('open');
  setTimeout(() => document.getElementById('cat-search').focus(), 260);
}

function closeCatalogue() {
  document.getElementById('cat-backdrop').classList.remove('open');
  document.getElementById('cat-panel').classList.remove('open');
  catSelected.clear(); updateSelCount();
}

function renderCatalogue(query) {
  const q   = query.toLowerCase();
  const body = document.getElementById('cat-body');
  let html   = '';

  // Also pull from jarvis_exercises (user's custom catalogue)
  let custom = [];
  try { custom = JSON.parse(localStorage.getItem('jarvis_exercises') || '[]'); } catch {}

  // Custom exercises section
  if (custom.length) {
    const filtered = custom.filter(e => !q || e.name.toLowerCase().includes(q));
    if (filtered.length) {
      html += `<div class="cat-section">
        <div class="cat-section-label">Your Catalogue</div>
        ${filtered.map(e => catRow(e.name, e.primaryMuscles?.join(', ') || '')).join('')}
      </div>`;
    }
  }

  // Built-in exercises grouped by category
  Object.entries(CATALOGUE).forEach(([cat, names]) => {
    const filtered = names.filter(n => !q || n.toLowerCase().includes(q));
    if (!filtered.length) return;
    html += `<div class="cat-section">
      <div class="cat-section-label">${cat}</div>
      ${filtered.map(n => {
        const map      = F.EXERCISE_MUSCLES[n] || {};
        const muscles  = (map.primary || []).map(id => {
          const mg = F.MUSCLE_GROUPS.find(g => g.id === id);
          return mg ? mg.name : id;
        }).slice(0,2).join(', ');
        return catRow(n, muscles);
      }).join('')}
    </div>`;
  });

  body.innerHTML = html || `<div style="padding:32px;text-align:center;color:var(--t3);font-size:13px">No exercises found.</div>`;
}

function catRow(name, muscles) {
  const sel = catSelected.has(name);
  return `<div class="cat-ex-row${sel ? ' selected' : ''}" onclick="toggleCatEx('${esc(name)}')">
    <div class="cat-cb">${sel ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}</div>
    <span class="cat-ex-name">${esc(name)}</span>
    <span class="cat-muscles">${esc(muscles)}</span>
  </div>`;
}

function toggleCatEx(name) {
  if (catSelected.has(name)) catSelected.delete(name);
  else catSelected.add(name);
  renderCatalogue(document.getElementById('cat-search').value);
  updateSelCount();
}

function filterCatalogue(q) { renderCatalogue(q); }

function updateSelCount() {
  const n = catSelected.size;
  document.getElementById('cat-sel-count').textContent =
    n ? `${n} exercise${n > 1 ? 's' : ''} selected` : 'None selected';
}

function addSelectedToDay() {
  if (!catSelected.size || catDayIdx === null || !catProgId) return;
  const prog = getPrograms().find(p => p.id === catProgId);
  if (!prog) return;
  if (!prog.days[catDayIdx]) prog.days[catDayIdx] = { name: DAY_NAMES[catDayIdx] + ' Workout', exercises: [] };
  const existing = new Set(prog.days[catDayIdx].exercises.map(e => e.name));
  catSelected.forEach(name => {
    if (!existing.has(name))
      prog.days[catDayIdx].exercises.push({ name, targetSets: 3, targetReps: '8-12' });
  });
  saveProgram(prog);
  closeCatalogue();
  editingDayIdx = catDayIdx;
  renderDetail(catProgId);
}

// ── Keyboard ──────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCatalogue();
});

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
